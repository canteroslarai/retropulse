{% extends "base.html" %}
{% block content %}
<div class="filters">
    <a href="/tienda">Todos</a> | <a href="/tienda?cat=Consolas">Consolas</a> | <a href="/tienda?cat=Accesorios">Accesorios</a>
</div>
<div class="grid">
    {% for p in productos %}
    <div class="card">
        <img src="{{ p.img }}"><h3>{{ p.nombre }}</h3><p>${{ p.precio }}</p>
        <a href="/producto/{{ p.id }}" class="btn">Ver Detalle</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
