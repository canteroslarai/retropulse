<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ producto.nombre }} - Detalles</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #1a1a1a; color: #fff; padding: 40px; max-width: 600px; margin: 0 auto;">

    <a href="{{ url_for('index') }}" style="color: #00ffcc; text-decoration: none;">⬅ Volver a la tienda</a>
    <hr style="border-color: #444; margin: 20px 0;">
    
    <h1 style="color: #fff;">📋 Características del Producto</h1>
    
    <img src="{{ producto.imagen }}" alt="{{ producto.nombre }}" style="width: 100%; height: 300px; object-fit: cover; border-radius: 8px; border: 2px solid #ff0055; margin-bottom: 15px;">
    
    <h2 style="color: #ff0055; margin: 0;">{{ producto.nombre }}</h2>
    <p style="font-size: 24px; color: #00ffcc; font-weight: bold; margin-top: 5px;">Precio: ${{ producto.precio }}</p>
    
    <div style="background-color: #2a2a2a; padding: 20px; border-radius: 8px; border: 1px solid #444; margin: 20px 0;">
        <h3 style="margin-top: 0; color: #aaa;">Descripción Técnica:</h3>
        <p style="line-height: 1.6; color: #ddd; margin-bottom: 0;">{{ producto.descripcion }}</p>
    </div>
    
    <form action="{{ url_for('agregar_al_carrito', id_producto=producto.id) }}" method="POST">
        <button type="submit" style="width: 100%; background-color: #ff0055; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer;">
            Añadir este producto al Carrito
        </button>
    </form>

</body>
</html>
