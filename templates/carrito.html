<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body>
    <div class="header"><h1>Tu Carrito</h1> <a href="/">⬅ Seguir comprando</a></div>
    <div style="padding: 20px;">
        {% for item in items %}
            <div class="card" style="margin-bottom:10px;">{{ item.nombre }} (x{{ item.cant }}) - ${{ item.precio * item.cant }}</div>
        {% endfor %}
    </div>
</body>
</html>
