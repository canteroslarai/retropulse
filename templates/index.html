<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RetroVault Store</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #f4f1ea; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 2px solid #333; padding: 15px; background: white; text-align: center; }
        h1 { text-align: center; }
    </style>
</head>
<body>
    <h1>RetroVault: Catálogo</h1>
    <div class="grid">
        {% for p in productos %}
            <div class="card">
                <h3>{{ p.nombre }}</h3>
                <p>Categoría: {{ p.tipo }}</p>
                <p><strong>${{ p.precio }}</strong></p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
