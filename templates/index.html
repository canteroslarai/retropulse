<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPulse - Catálogo Gamer</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px;">

    <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0055; padding-bottom: 20px;">
        <h1>🎮 RetroPulse Store</h1>
        <a href="{{ url_for('ver_carrito') }}" style="background-color: #ff0055; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold;">
            🛒 Mi Carrito ({{ session.get('carrito', [])|length }})
        </a>
    </header>

    <h2 style="margin-top: 30px; color: #00ffcc;">Catálogo con Imágenes</h2>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
        {% for p in productos %}
        <div style="background-color: #2a2a2a; border: 1px solid #444; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <img src="{{ p.imagen }}" alt="{{ p.nombre }}" style="width: 100%; height: 160px; object-fit: cover; border-radius: 4px; background-color: #444; margin-bottom: 12px;">
                <h3 style="color: #fff; margin: 0; font-size: 16px;">{{ p.nombre }}</h3>
                <p style="color: #00ffcc; font-size: 18px; font-weight: bold; margin: 8px 0;">${{ p.precio }}</p>
            </div>
            
            <div style="margin-top: 10px;">
                <a href="{{ url_for('detalle', id_producto=p.id) }}" style="display: block; text-align: center; color: #aaa; text-decoration: none; margin-bottom: 10px; font-size: 13px;">🔍 Ver Características</a>
                
                <form action="{{ url_for('agregar_al_carrito', id_producto=p.id) }}" method="POST">
                    <button type="submit" style="width: 100%; background-color: #00ffcc; color: #1a1a1a; border: none; padding: 10px; font-weight: bold; border-radius: 5px; cursor: pointer;">
                        🛒 Comprar
                    </button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
