<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RetroVault Store</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background-color: #f4f1ea; 
            padding: 20px; 
            color: #333;
        }
        h1 { 
            text-align: center; 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        .card { 
            border: 2px solid #333; 
            padding: 15px; 
            background: white; 
            text-align: center; 
            transition: transform 0.2s;
        }
        .card:hover { 
            transform: scale(1.05); 
            background-color: #fffaf0;
        }
        .price { 
            font-weight: bold; 
            color: #8b4513; 
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>RetroVault: Catálogo de Tesoros</h1>
    <div class="grid">
        {% for p in productos %}
            <div class="card">
                <h3>{{ p.nombre }}</h3>
                <p>Categoría: {{ p.tipo }}</p>
                <p class="price">${{ p.precio }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
